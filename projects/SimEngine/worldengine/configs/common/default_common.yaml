# Default common configs

defaults:
  - worker: ray_distributed
  - renderer: mtgs

distributed_timeout_seconds: 7200 # Sets how long to wait while synchronizing across worker nodes in a distributed context.

selected_simulation_metrics: null

# Sets verbosity level, in particular determines if progress bars are shown or not.
verbose: false

# Default experiment configs
# group: ${oc.env:WORLDENGINE_EXP_ROOT}/exp           # This is where results, logs, config, etc. are saved
group: 'exp'
experiment_name: 'simulation'                       # Experiment name, by default 'simulation' or 'training'
job_name: 'test'                                    # Job name, as defined in the specific yaml files.

# Directory structure
date_format: '%Y.%m.%d.%H.%M.%S'
experiment_uid: ${now:%Y.%m.%d.%H.%M.%S}                     # Unique Id of the experiment, default to timestamp
experiment: ${experiment_name}/${job_name}          # Unique name of the experiment
output_dir: ${group}/${experiment}                  # Output directory to save all training artifacts
metric_dir: metrics                                 # Metric dir name to save metric results.
aggregator_metric_dir: aggregator_metric            # Aggregator metric dir name to save aggregated metrics.
runner_report_file: runner_report_${now:%Y%m%d_%H%M%S}.json  # Name of the runner report file, timestamped to avoid overwrite on resume
log_config: false                                   # Whether to log the final config after all overrides and interpolations

# Execution, engine
seed: 0                                             # Random seed value.
enable_profiling: false                             # Whether to enable profiler which will be dumped to "profiling" folder
gpu: true                                           # Whether to use available GPUs during training/simulation

max_step: 1000000                                   # Maximum number of steps to run the simulation
decision_repeat: 1                                  # Number of times to repeat the decision making process

# Logger
log_level: critical                                     # Level of logger
logger_format_string: null                          # Logger format string, set null to use the default format string